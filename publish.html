<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布新文章 - Songyang</title>
  <link rel="stylesheet" href="/css/index.css?v=5.5.2">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css">
  <style>
    .publish-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 2rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }
    .form-group textarea {
      min-height: 200px;
      resize: vertical;
    }
    .submit-btn {
      background: #42b983;
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }
    .submit-btn:hover {
      background: #3aa776;
    }
  </style>
</head>
<body>
  <div class="publish-container">
    <h2>发布新文章</h2>
    <form id="publish-form">
      <div class="form-group">
        <label for="title">文章标题</label>
        <input type="text" id="title" name="title" required placeholder="请输入文章标题">
      </div>
      <div class="form-group">
        <label for="category">文章分类</label>
        <select id="category" name="category" required>
          <option value="博客搭建">博客搭建</option>
          <option value="前端开发">前端开发</option>
          <option value="后端开发">后端开发</option>
          <option value="网络安全">网络安全</option>
        </select>
      </div>
      <div class="form-group">
        <label for="tags">文章标签（用逗号分隔）</label>
        <input type="text" id="tags" name="tags" placeholder="例如: Hexo, 教程">
      </div>
      <div class="form-group">
        <label for="content">文章内容（支持简单文本）</label>
        <textarea id="content" name="content" required placeholder="请输入文章内容"></textarea>
      </div>
      <button type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> 发布文章</button>
    </form>
  </div>

  <script>
    // 格式化日期：2026-03-03
    const formatDate = () => {
      const date = new Date();
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      return `${year}-${month}-${day}`;
    };

    // 生成唯一的文章标识（slug），用于URL链接
    const generateSlug = (title) => {
      // 转小写 + 替换特殊字符 + 去除首尾横线
      return title.toLowerCase()
        .replace(/[\s\u4e00-\u9fa5]+/g, '-') // 空格和中文替换为横线
        .replace(/[^a-z0-9-]/g, '') // 移除非字母数字和横线的字符
        .replace(/(^-|-$)/g, '') // 移除首尾横线
        .replace(/-+/g, '-'); // 多个横线合并为一个
    };

    // 提交表单
    document.getElementById('publish-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const title = document.getElementById('title').value.trim();
      const category = document.getElementById('category').value;
      const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t);
      const content = document.getElementById('content').value.trim();
      const date = formatDate();
      // 生成唯一slug（解决文章链接点击问题的核心）
      const slug = generateSlug(title) || `post-${Date.now()}`; // 兜底：如果标题为空则用时间戳

      // 1. 获取本地存储的文章列表
      let posts = JSON.parse(localStorage.getItem('my_blog_posts')) || [];
      // 2. 添加新文章（新增slug字段）
      posts.unshift({ // unshift 把新文章放到最前面
        id: Date.now(), // 唯一ID
        title,
        category,
        tags,
        content,
        date,
        slug // 新增：文章唯一标识，用于链接
      });
      // 3. 存回本地存储
      localStorage.setItem('my_blog_posts', JSON.stringify(posts));
      
      // 4. 提示并跳转到主页
      alert('发布成功！即将返回主页');
      window.location.href = '/'; // 跳转到 index.html
    });
  </script>
</body>
</html>
