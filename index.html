<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布新文章 - Songyang</title>
  <link rel="stylesheet" href="/css/index.css?v=5.5.2">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css">
  <style>
    .publish-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 2rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }
    .form-group textarea {
      min-height: 200px;
      resize: vertical;
    }
    .submit-btn {
      background: #42b983;
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }
    .submit-btn:hover {
      background: #3aa776;
    }
    /* 富文本操作按钮 */
    .rich-text-actions {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }
    .insert-btn {
      padding: 0.5rem 1rem;
      background: #f0f2f5;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .insert-btn:hover {
      background: #e6e8eb;
    }
  </style>
</head>
<body>
  <div class="publish-container">
    <h2>发布新文章</h2>
    <form id="publish-form">
      <div class="form-group">
        <label for="title">文章标题</label>
        <input type="text" id="title" name="title" required placeholder="请输入文章标题">
      </div>
      <div class="form-group">
        <label for="category">文章分类</label>
        <select id="category" name="category" required>
          <option value="博客搭建">博客搭建</option>
          <option value="前端开发">前端开发</option>
          <option value="后端开发">后端开发</option>
          <option value="网络安全">网络安全</option>
        </select>
      </div>
      <div class="form-group">
        <label for="tags">文章标签（用逗号分隔）</label>
        <input type="text" id="tags" name="tags" placeholder="例如: Hexo, 教程">
      </div>
      <div class="form-group">
        <label for="content">文章内容（支持图片/附件）</label>
        <div class="rich-text-actions">
          <button type="button" class="insert-btn" id="insert-image">
            <i class="fas fa-image"></i> 插入图片
          </button>
          <button type="button" class="insert-btn" id="insert-attachment">
            <i class="fas fa-paperclip"></i> 插入附件
          </button>
        </div>
        <textarea id="content" name="content" required placeholder="请输入文章内容，可使用Markdown语法插入图片/附件"></textarea>
      </div>
      <button type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> 发布文章</button>
    </form>
  </div>

  <script>
    // 格式化日期：2026-03-03
    const formatDate = () => {
      const date = new Date();
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      return `${year}-${month}-${day}`;
    };

    // 插入图片
    document.getElementById('insert-image').addEventListener('click', () => {
      const imageUrl = prompt('请输入图片URL：');
      if (imageUrl) {
        const content = document.getElementById('content');
        content.value += `\n![图片](${imageUrl})\n`;
      }
    });

    // 插入附件
    document.getElementById('insert-attachment').addEventListener('click', () => {
      const attachmentUrl = prompt('请输入附件URL：');
      const attachmentName = prompt('请输入附件名称：');
      if (attachmentUrl && attachmentName) {
        const content = document.getElementById('content');
        content.value += `\n[${attachmentName}](${attachmentUrl})\n`;
      }
    });

    // 提交表单
    document.getElementById('publish-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const title = document.getElementById('title').value.trim();
      const category = document.getElementById('category').value;
      const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t);
      const content = document.getElementById('content').value.trim();
      const date = formatDate();
      const id = Date.now(); // 使用时间戳作为唯一ID，彻底杜绝重复

      // 1. 获取本地存储的文章列表
      let posts = JSON.parse(localStorage.getItem('my_blog_posts')) || [];
      // 2. 添加新文章（移除slug，改用id作为锚点）
      posts.unshift({
        id, // 核心：唯一ID
        title,
        category,
        tags,
        content,
        date
      });
      // 3. 存回本地存储
      localStorage.setItem('my_blog_posts', JSON.stringify(posts));
      
      // 4. 提示并跳转到主页
      alert('发布成功！即将返回主页');
      window.location.href = '/'; // 跳转到 index.html
    });
  </script>
</body>
</html>
